# Primal discovery defaults — UDS-first, TCP bootstrap fallback.
#
# Resolution order (per primal):
#   1. Environment: ${PRIMAL}_SOCKET (UDS) or ${PRIMAL}_PORT (TCP)
#   2. XDG discovery socket: capability.resolve → result.socket / result.port
#   3. This config: [sockets] (UDS) then [bootstrap_tcp] (last resort)
#
# VPS deployments (--uds-only) should never reach [bootstrap_tcp].
# Desktop/dev environments may use TCP during bringup.

[metadata]
vps_standard = "uds_only"
transport_preference = "uds"

[sockets]
discovery  = "${XDG_RUNTIME_DIR}/ecoPrimals/discovery.sock"
beardog    = "${XDG_RUNTIME_DIR}/ecoPrimals/beardog.sock"
songbird   = "${XDG_RUNTIME_DIR}/ecoPrimals/songbird.sock"
toadstool  = "${XDG_RUNTIME_DIR}/ecoPrimals/toadstool.sock"
nestgate   = "${XDG_RUNTIME_DIR}/ecoPrimals/nestgate.sock"
rhizocrypt = "${XDG_RUNTIME_DIR}/ecoPrimals/rhizocrypt-dag.sock"
loamspine  = "${XDG_RUNTIME_DIR}/ecoPrimals/loamspine.sock"
sweetgrass = "${XDG_RUNTIME_DIR}/ecoPrimals/sweetgrass.sock"

# TCP bootstrap — dev/desktop only. Not used in VPS --uds-only mode.
[bootstrap_tcp]
host       = "127.0.0.1"
beardog    = 9100
songbird   = 9200
toadstool  = 9400
nestgate   = 9500
rhizocrypt = 9601
loamspine  = 9700
sweetgrass = 9850

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Shellcheck deploy scripts
        run: |
          sudo apt-get install -y shellcheck
          shellcheck deploy/fetch_sources.sh
          shellcheck deploy/foundation_validate.sh
          shellcheck deploy/backfill_hashes.sh
          shellcheck deploy/lib/primal_ipc.sh
          shellcheck deploy/lib/target_compare.sh

      - name: Install TOML parser for Python 3.11+
        run: pip install tomli

      - name: TOML syntax check
        run: |
          python3 -c "
          import sys, pathlib
          try:
              import tomllib
          except ImportError:
              import tomli as tomllib
          errors = 0
          for f in sorted(pathlib.Path('.').rglob('*.toml')):
              if 'archive' in str(f) or 'node_modules' in str(f):
                  continue
              try:
                  tomllib.loads(f.read_text())
              except Exception as e:
                  print(f'FAIL: {f}: {e}')
                  errors += 1
          print(f'{errors} TOML error(s)' if errors else 'All TOML files valid')
          sys.exit(1 if errors else 0)
          "

      - name: Target TOML schema validation
        run: |
          python3 -c "
          import sys, pathlib
          try:
              import tomllib
          except ImportError:
              import tomli as tomllib

          REQUIRED_KEYS = {'id', 'description'}
          NUMERIC_KEYS = {'expected_value', 'tolerance', 'tolerance_pct'}

          errors = 0
          total = 0
          for f in sorted(pathlib.Path('data/targets').glob('*.toml')):
              data = tomllib.loads(f.read_text())
              targets = data.get('targets', [])
              for i, t in enumerate(targets):
                  total += 1
                  tid = t.get('id', f'targets[{i}]')
                  for key in REQUIRED_KEYS:
                      if key not in t:
                          print(f'FAIL: {f.name} target {tid}: missing required key \"{key}\"')
                          errors += 1
                  has_ev = 'expected_value' in t
                  has_tol = 'tolerance' in t or 'tolerance_pct' in t
                  if has_ev and not has_tol:
                      print(f'WARN: {f.name} target {tid}: has expected_value but no tolerance/tolerance_pct')
                  for key in NUMERIC_KEYS:
                      if key in t and not isinstance(t[key], (int, float)):
                          print(f'FAIL: {f.name} target {tid}: {key} must be numeric, got {type(t[key]).__name__}')
                          errors += 1
          print(f'Checked {total} targets across {len(list(pathlib.Path(\"data/targets\").glob(\"*.toml\")))} files')
          print(f'{errors} schema error(s)' if errors else 'All targets conform to schema')
          sys.exit(1 if errors else 0)
          "

      - name: Validate thread index completeness
        run: |
          python3 -c "
          import sys, pathlib
          try:
              import tomllib
          except ImportError:
              import tomli as tomllib
          idx = tomllib.loads(pathlib.Path('lineage/THREAD_INDEX.toml').read_text())
          threads = idx.get('threads', [])
          missing = []
          for t in threads:
              tid = t.get('id', '')
              src = t.get('data_sources', '')
              tgt = t.get('data_targets', '')
              if src and not pathlib.Path(src).exists():
                  missing.append(f'Thread {tid}: missing source {src}')
              if tgt and not pathlib.Path(tgt).exists():
                  missing.append(f'Thread {tid}: missing target {tgt}')
              ml_src = t.get('ml_data_sources', '')
              ml_tgt = t.get('ml_data_targets', '')
              if ml_src and not pathlib.Path(ml_src).exists():
                  missing.append(f'Thread {tid}: missing ML source {ml_src}')
              if ml_tgt and not pathlib.Path(ml_tgt).exists():
                  missing.append(f'Thread {tid}: missing ML target {ml_tgt}')
          for m in missing:
              print(f'WARN: {m}')
          if missing:
              sys.exit(1)
          print(f'{len(threads)} threads indexed, all manifests present')
          "

      - name: Data manifest hash coverage
        run: |
          python3 -c "
          import sys, pathlib
          try:
              import tomllib
          except ImportError:
              import tomli as tomllib
          total_hashed = 0
          total_sources = 0
          per_file = {}
          for f in sorted(pathlib.Path('data/sources').glob('*.toml')):
              data = tomllib.loads(f.read_text())
              sources = data.get('source', data.get('sources', []))
              if not isinstance(sources, list):
                  continue
              hashed = 0
              empty = 0
              for s in sources:
                  if not isinstance(s, dict):
                      continue
                  total_sources += 1
                  if s.get('blake3', ''):
                      hashed += 1
                      total_hashed += 1
                  else:
                      empty += 1
              per_file[f.name] = (hashed, hashed + empty)
              print(f'{f.name}: {hashed}/{hashed + empty} hashed')
          pct = (total_hashed / total_sources * 100) if total_sources > 0 else 0
          print(f'Overall: {total_hashed}/{total_sources} ({pct:.0f}%)')

          # Thread 1 WCM: gate on non-regression (baseline: 10 hashed)
          wcm = per_file.get('thread01_wcm.toml', (0, 0))
          if wcm[0] < 10:
              print(f'::error::Thread 1 WCM hash regression: {wcm[0]}/10 (baseline 10)')
              sys.exit(1)
          else:
              print(f'Thread 1 WCM: {wcm[0]}/{wcm[1]} hashed (baseline: 10)')

          # Overall non-regression (baseline: 10 hashed sources)
          if total_hashed < 10:
              print(f'::error::Overall hash regression: {total_hashed} < 10')
              sys.exit(1)
          "

      - name: Workload TOML integrity
        run: |
          python3 -c "
          import sys, pathlib
          try:
              import tomllib
          except ImportError:
              import tomli as tomllib

          errors = 0
          checked = 0
          for f in sorted(pathlib.Path('workloads').rglob('*.toml')):
              checked += 1
              data = tomllib.loads(f.read_text())
              meta = data.get('metadata', {})
              exe = data.get('execution', {})
              sec = data.get('security', {})

              if not meta.get('name'):
                  print(f'FAIL: {f}: missing metadata.name')
                  errors += 1
              if not meta.get('thread'):
                  print(f'FAIL: {f}: missing metadata.thread')
                  errors += 1
              if not exe.get('command'):
                  print(f'FAIL: {f}: missing execution.command')
                  errors += 1

              iso = sec.get('isolation_level', '')
              if iso == 'None':
                  print(f'WARN: {f}: isolation_level=\"None\" — should be Standard for toadStool compatibility')

          print(f'Checked {checked} workload TOMLs, {errors} error(s)')
          sys.exit(1 if errors else 0)
          "

      - name: Run CPU parity benchmarks
        run: |
          pip install -r benchmarks/barracuda_cpu_parity/requirements.txt
          python3 benchmarks/barracuda_cpu_parity/stats_variance.py
          python3 benchmarks/barracuda_cpu_parity/stats_mean.py
          python3 benchmarks/barracuda_cpu_parity/md_velocity_verlet.py
          python3 benchmarks/barracuda_cpu_parity/spectral_eigenvalues.py
          python3 benchmarks/barracuda_cpu_parity/linalg_solve.py
          python3 benchmarks/barracuda_cpu_parity/matmul.py

      - name: Graph TOML structural validation
        run: |
          python3 -c "
          import sys, pathlib
          try:
              import tomllib
          except ImportError:
              import tomli as tomllib

          errors = 0
          for f in sorted(pathlib.Path('graphs').glob('*.toml')):
              data = tomllib.loads(f.read_text())
              graph = data.get('graph', {})

              if not graph.get('name'):
                  print(f'FAIL: {f.name}: missing graph.name')
                  errors += 1
              if not graph.get('id'):
                  print(f'FAIL: {f.name}: missing graph.id')
                  errors += 1

              nodes = graph.get('nodes', [])
              if not nodes:
                  print(f'FAIL: {f.name}: no graph.nodes defined')
                  errors += 1

              node_names = set()
              for i, node in enumerate(nodes):
                  name = node.get('name', '')
                  if not name:
                      print(f'FAIL: {f.name}: node[{i}] missing name')
                      errors += 1
                  if name in node_names:
                      print(f'FAIL: {f.name}: duplicate node name \"{name}\"')
                      errors += 1
                  node_names.add(name)

                  if 'by_capability' not in node:
                      print(f'WARN: {f.name}: node \"{name}\" missing by_capability')
                  if 'health_method' not in node:
                      print(f'WARN: {f.name}: node \"{name}\" missing health_method')

                  for dep in node.get('depends_on', []):
                      if dep not in node_names:
                          print(f'FAIL: {f.name}: node \"{name}\" depends_on \"{dep}\" which is not defined (or ordered after)')
                          errors += 1

          print(f'{errors} graph validation error(s)' if errors else 'All graphs structurally valid')
          sys.exit(1 if errors else 0)
          "

      - name: Source count reconciliation and schema
        run: |
          python3 -c "
          import sys, pathlib
          try:
              import tomllib
          except ImportError:
              import tomli as tomllib

          errors = 0
          total_sources = 0
          for f in sorted(pathlib.Path('data/sources').glob('*.toml')):
              data = tomllib.loads(f.read_text())
              meta = data.get('meta', {})
              sources = data.get('sources', [])
              actual = len(sources)
              total_sources += actual

              declared = meta.get('total_sources')
              if declared is not None and declared != actual:
                  print(f'FAIL: {f.name}: meta.total_sources={declared} but actual [[sources]] count={actual}')
                  errors += 1

              for i, s in enumerate(sources):
                  sid = s.get('id', f'sources[{i}]')
                  if not s.get('id'):
                      print(f'FAIL: {f.name} source [{i}]: missing id')
                      errors += 1
                  if not s.get('database'):
                      print(f'FAIL: {f.name} source {sid}: missing database')
                      errors += 1
                  if not s.get('description'):
                      print(f'FAIL: {f.name} source {sid}: missing description')
                      errors += 1

          print(f'Checked {total_sources} sources across {len(list(pathlib.Path(\"data/sources\").glob(\"*.toml\")))} files')
          print(f'{errors} source schema error(s)' if errors else 'All sources conform to schema')
          sys.exit(1 if errors else 0)
          "

      - name: Target count reconciliation
        run: |
          python3 -c "
          import sys, pathlib
          try:
              import tomllib
          except ImportError:
              import tomli as tomllib

          errors = 0
          for f in sorted(pathlib.Path('data/targets').glob('*.toml')):
              data = tomllib.loads(f.read_text())
              meta = data.get('meta', {})
              declared = meta.get('total_targets')
              actual = len(data.get('targets', []))
              if declared is not None and declared != actual:
                  print(f'FAIL: {f.name}: meta.total_targets={declared} but actual [[targets]] count={actual}')
                  errors += 1
              elif declared is None:
                  print(f'WARN: {f.name}: no meta.total_targets declared')

          print(f'{errors} count mismatch(es)' if errors else 'All target counts match')
          sys.exit(1 if errors else 0)
          "

      - name: Thread 1 WCM source-target integrity
        run: |
          python3 -c "
          import sys, pathlib
          try:
              import tomllib
          except ImportError:
              import tomli as tomllib

          errors = 0

          # Verify sources file exists and parses
          src_path = pathlib.Path('data/sources/thread01_wcm.toml')
          src_data = tomllib.loads(src_path.read_text())
          sources = src_data.get('sources', [])
          hashed = [s for s in sources if s.get('blake3', '')]
          print(f'Thread 1 WCM sources: {len(sources)} total, {len(hashed)} with BLAKE3')

          # Verify targets file exists and parses
          tgt_path = pathlib.Path('data/targets/thread01_wcm_targets.toml')
          tgt_data = tomllib.loads(tgt_path.read_text())
          targets = tgt_data.get('targets', [])
          meta = tgt_data.get('meta', {})
          declared = meta.get('total_targets', 0)
          print(f'Thread 1 WCM targets: {len(targets)} total (declared: {declared})')

          # Every target must reference a valid spring
          valid_springs = {'hotSpring', 'wetSpring', 'groundSpring', 'airSpring',
                           'healthSpring', 'neuralSpring', 'ludoSpring', 'primalSpring'}
          for t in targets:
              spring = t.get('spring', '')
              if spring and spring not in valid_springs:
                  print(f'WARN: target {t.get(\"id\",\"?\")} references unknown spring: {spring}')

              ev = t.get('expected_value')
              has_tol = 'tolerance' in t or 'tolerance_pct' in t
              if ev is not None and not has_tol:
                  print(f'FAIL: target {t.get(\"id\",\"?\")} has expected_value but no tolerance')
                  errors += 1

          # Verify workloads exist for thread01
          wl_dir = pathlib.Path('workloads/thread01_wcm')
          if not wl_dir.exists():
              print(f'FAIL: workloads/thread01_wcm/ directory missing')
              errors += 1
          else:
              wls = list(wl_dir.glob('*.toml'))
              print(f'Thread 1 WCM workloads: {len(wls)}')
              for wl in wls:
                  wl_data = tomllib.loads(wl.read_text())
                  wl_meta = wl_data.get('metadata', {})
                  if wl_meta.get('thread') != '01':
                      print(f'FAIL: {wl.name} has thread={wl_meta.get(\"thread\")} not \"01\"')
                      errors += 1

          print(f'{errors} error(s)' if errors else 'Thread 1 WCM integrity: PASS')
          sys.exit(1 if errors else 0)
          "

      - name: Gate naming consistency
        run: |
          python3 -c "
          import pathlib, sys, re

          inconsistent = []
          for f in sorted(pathlib.Path('.').rglob('*')):
              if f.is_file() and f.suffix in ('.sh', '.md', '.toml', '.yml', '.yaml'):
                  try:
                      text = f.read_text()
                  except Exception:
                      continue
                  if 'ironGate' in text:
                      inconsistent.append(str(f))
          if inconsistent:
              print(f'FAIL: {len(inconsistent)} file(s) use \"ironGate\" instead of \"irongate\":')
              for f in inconsistent:
                  print(f'  - {f}')
              sys.exit(1)
          print('Gate naming consistent (all lowercase irongate)')
          "

# SPDX-License-Identifier: AGPL-3.0-or-later
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Shellcheck deploy scripts
        run: |
          sudo apt-get install -y shellcheck
          shellcheck deploy/fetch_sources.sh
          shellcheck deploy/foundation_validate.sh
          shellcheck deploy/backfill_hashes.sh
          shellcheck deploy/lib/primal_ipc.sh
          shellcheck deploy/lib/target_compare.sh
          shellcheck deploy/lib/json_rpc.sh
          shellcheck deploy/lib/thread_registry.sh
          shellcheck deploy/lib/report_writer.sh
          shellcheck deploy/lib/env.sh

      - name: Install TOML parser for Python 3.11+
        run: pip install tomli

      - name: TOML syntax check
        run: |
          python3 -c "
          import sys, pathlib
          try:
              import tomllib
          except ImportError:
              import tomli as tomllib
          errors = 0
          for f in sorted(pathlib.Path('.').rglob('*.toml')):
              if 'archive' in str(f) or 'node_modules' in str(f):
                  continue
              try:
                  tomllib.loads(f.read_text())
              except Exception as e:
                  print(f'FAIL: {f}: {e}')
                  errors += 1
          print(f'{errors} TOML error(s)' if errors else 'All TOML files valid')
          sys.exit(1 if errors else 0)
          "

      - name: Target TOML schema validation
        run: |
          python3 -c "
          import sys, pathlib
          try:
              import tomllib
          except ImportError:
              import tomli as tomllib

          REQUIRED_KEYS = {'id', 'description'}
          NUMERIC_KEYS = {'expected_value', 'tolerance', 'tolerance_pct'}

          errors = 0
          total = 0
          for f in sorted(pathlib.Path('data/targets').glob('*.toml')):
              data = tomllib.loads(f.read_text())
              targets = data.get('targets', [])
              for i, t in enumerate(targets):
                  total += 1
                  tid = t.get('id', f'targets[{i}]')
                  for key in REQUIRED_KEYS:
                      if key not in t:
                          print(f'FAIL: {f.name} target {tid}: missing required key \"{key}\"')
                          errors += 1
                  has_ev = 'expected_value' in t
                  has_tol = 'tolerance' in t or 'tolerance_pct' in t
                  if has_ev and not has_tol:
                      print(f'WARN: {f.name} target {tid}: has expected_value but no tolerance/tolerance_pct')
                  for key in NUMERIC_KEYS:
                      if key in t and not isinstance(t[key], (int, float)):
                          print(f'FAIL: {f.name} target {tid}: {key} must be numeric, got {type(t[key]).__name__}')
                          errors += 1
          print(f'Checked {total} targets across {len(list(pathlib.Path(\"data/targets\").glob(\"*.toml\")))} files')
          print(f'{errors} schema error(s)' if errors else 'All targets conform to schema')
          sys.exit(1 if errors else 0)
          "

      - name: Validate thread index completeness
        run: |
          python3 -c "
          import sys, pathlib
          try:
              import tomllib
          except ImportError:
              import tomli as tomllib
          idx = tomllib.loads(pathlib.Path('lineage/THREAD_INDEX.toml').read_text())
          threads = idx.get('threads', [])
          missing = []
          for t in threads:
              tid = t.get('id', '')
              src = t.get('data_sources', '')
              tgt = t.get('data_targets', '')
              if src and not pathlib.Path(src).exists():
                  missing.append(f'Thread {tid}: missing source {src}')
              if tgt and not pathlib.Path(tgt).exists():
                  missing.append(f'Thread {tid}: missing target {tgt}')
              ml_src = t.get('ml_data_sources', '')
              ml_tgt = t.get('ml_data_targets', '')
              if ml_src and not pathlib.Path(ml_src).exists():
                  missing.append(f'Thread {tid}: missing ML source {ml_src}')
              if ml_tgt and not pathlib.Path(ml_tgt).exists():
                  missing.append(f'Thread {tid}: missing ML target {ml_tgt}')
          for m in missing:
              print(f'WARN: {m}')
          if missing:
              sys.exit(1)
          print(f'{len(threads)} threads indexed, all manifests present')
          "

      - name: Data manifest hash coverage
        run: |
          python3 -c "
          import sys, pathlib
          try:
              import tomllib
          except ImportError:
              import tomli as tomllib
          total_hashed = 0
          total_sources = 0
          per_file = {}
          for f in sorted(pathlib.Path('data/sources').glob('*.toml')):
              data = tomllib.loads(f.read_text())
              sources = data.get('source', data.get('sources', []))
              if not isinstance(sources, list):
                  continue
              hashed = 0
              empty = 0
              for s in sources:
                  if not isinstance(s, dict):
                      continue
                  total_sources += 1
                  if s.get('blake3', ''):
                      hashed += 1
                      total_hashed += 1
                  else:
                      empty += 1
              per_file[f.name] = (hashed, hashed + empty)
              print(f'{f.name}: {hashed}/{hashed + empty} hashed')
          pct = (total_hashed / total_sources * 100) if total_sources > 0 else 0
          print(f'Overall: {total_hashed}/{total_sources} ({pct:.0f}%)')

          # Thread 1 WCM: gate on non-regression (baseline: 10 hashed)
          wcm = per_file.get('thread01_wcm.toml', (0, 0))
          if wcm[0] < 10:
              print(f'::error::Thread 1 WCM hash regression: {wcm[0]}/10 (baseline 10)')
              sys.exit(1)
          else:
              print(f'Thread 1 WCM: {wcm[0]}/{wcm[1]} hashed (baseline: 10)')

          # Overall non-regression (baseline: 10 hashed sources)
          if total_hashed < 10:
              print(f'::error::Overall hash regression: {total_hashed} < 10')
              sys.exit(1)
          "

      - name: Workload TOML integrity
        run: |
          python3 -c "
          import sys, pathlib
          try:
              import tomllib
          except ImportError:
              import tomli as tomllib

          errors = 0
          checked = 0
          for f in sorted(pathlib.Path('workloads').rglob('*.toml')):
              checked += 1
              data = tomllib.loads(f.read_text())
              meta = data.get('metadata', {})
              exe = data.get('execution', {})
              sec = data.get('security', {})

              if not meta.get('name'):
                  print(f'FAIL: {f}: missing metadata.name')
                  errors += 1
              if not meta.get('thread'):
                  print(f'FAIL: {f}: missing metadata.thread')
                  errors += 1
              if not exe.get('command'):
                  print(f'FAIL: {f}: missing execution.command')
                  errors += 1

              iso = sec.get('isolation_level', '')
              if iso == 'None':
                  print(f'WARN: {f}: isolation_level=\"None\" — should be Standard for toadStool compatibility')

          print(f'Checked {checked} workload TOMLs, {errors} error(s)')
          sys.exit(1 if errors else 0)
          "

      - name: Run CPU parity benchmarks
        run: |
          pip install -r benchmarks/barracuda_cpu_parity/requirements.txt
          python3 benchmarks/barracuda_cpu_parity/stats_variance.py
          python3 benchmarks/barracuda_cpu_parity/stats_mean.py
          python3 benchmarks/barracuda_cpu_parity/md_velocity_verlet.py
          python3 benchmarks/barracuda_cpu_parity/spectral_eigenvalues.py
          python3 benchmarks/barracuda_cpu_parity/linalg_solve.py
          python3 benchmarks/barracuda_cpu_parity/matmul.py

      - name: Benchmark result portability check
        run: |
          python3 -c "
          import json, sys, pathlib
          errors = 0
          for f in sorted(pathlib.Path('benchmarks/barracuda_cpu_parity').glob('*_results.json')):
              data = json.loads(f.read_text())
              cmd = data.get('provenance', {}).get('command', '')
              if cmd.startswith('/'):
                  print(f'FAIL: {f}: absolute path in provenance.command: {cmd}')
                  errors += 1
          if errors:
              sys.exit(1)
          print('All benchmark result JSONs use repo-relative paths')
          "

      - name: Graph TOML structural validation
        run: |
          python3 -c "
          import sys, pathlib
          try:
              import tomllib
          except ImportError:
              import tomli as tomllib

          errors = 0
          for f in sorted(pathlib.Path('graphs').glob('*.toml')):
              data = tomllib.loads(f.read_text())
              graph = data.get('graph', {})

              if not graph.get('name'):
                  print(f'FAIL: {f.name}: missing graph.name')
                  errors += 1
              if not graph.get('id'):
                  print(f'FAIL: {f.name}: missing graph.id')
                  errors += 1

              nodes = graph.get('nodes', [])
              if not nodes:
                  print(f'FAIL: {f.name}: no graph.nodes defined')
                  errors += 1

              node_names = set()
              for i, node in enumerate(nodes):
                  name = node.get('name', '')
                  if not name:
                      print(f'FAIL: {f.name}: node[{i}] missing name')
                      errors += 1
                  if name in node_names:
                      print(f'FAIL: {f.name}: duplicate node name \"{name}\"')
                      errors += 1
                  node_names.add(name)

                  if 'by_capability' not in node:
                      print(f'WARN: {f.name}: node \"{name}\" missing by_capability')
                  if 'health_method' not in node:
                      print(f'WARN: {f.name}: node \"{name}\" missing health_method')

                  for dep in node.get('depends_on', []):
                      if dep not in node_names:
                          print(f'FAIL: {f.name}: node \"{name}\" depends_on \"{dep}\" which is not defined (or ordered after)')
                          errors += 1

          print(f'{errors} graph validation error(s)' if errors else 'All graphs structurally valid')
          sys.exit(1 if errors else 0)
          "

      - name: Source count reconciliation and schema
        run: |
          python3 -c "
          import sys, pathlib
          try:
              import tomllib
          except ImportError:
              import tomli as tomllib

          errors = 0
          total_sources = 0
          for f in sorted(pathlib.Path('data/sources').glob('*.toml')):
              data = tomllib.loads(f.read_text())
              meta = data.get('meta', {})
              sources = data.get('sources', [])
              actual = len(sources)
              total_sources += actual

              declared = meta.get('total_sources')
              if declared is not None and declared != actual:
                  print(f'FAIL: {f.name}: meta.total_sources={declared} but actual [[sources]] count={actual}')
                  errors += 1

              for i, s in enumerate(sources):
                  sid = s.get('id', f'sources[{i}]')
                  if not s.get('id'):
                      print(f'FAIL: {f.name} source [{i}]: missing id')
                      errors += 1
                  if not s.get('database'):
                      print(f'FAIL: {f.name} source {sid}: missing database')
                      errors += 1
                  if not s.get('description'):
                      print(f'FAIL: {f.name} source {sid}: missing description')
                      errors += 1

          print(f'Checked {total_sources} sources across {len(list(pathlib.Path(\"data/sources\").glob(\"*.toml\")))} files')
          print(f'{errors} source schema error(s)' if errors else 'All sources conform to schema')
          sys.exit(1 if errors else 0)
          "

      - name: Target count reconciliation
        run: |
          python3 -c "
          import sys, pathlib
          try:
              import tomllib
          except ImportError:
              import tomli as tomllib

          errors = 0
          for f in sorted(pathlib.Path('data/targets').glob('*.toml')):
              data = tomllib.loads(f.read_text())
              meta = data.get('meta', {})
              declared = meta.get('total_targets')
              actual = len(data.get('targets', []))
              if declared is not None and declared != actual:
                  print(f'FAIL: {f.name}: meta.total_targets={declared} but actual [[targets]] count={actual}')
                  errors += 1
              elif declared is None:
                  print(f'WARN: {f.name}: no meta.total_targets declared')

          print(f'{errors} count mismatch(es)' if errors else 'All target counts match')
          sys.exit(1 if errors else 0)
          "

      - name: Thread 1 WCM source-target integrity
        run: |
          python3 -c "
          import sys, pathlib
          try:
              import tomllib
          except ImportError:
              import tomli as tomllib

          errors = 0

          # Verify sources file exists and parses
          src_path = pathlib.Path('data/sources/thread01_wcm.toml')
          src_data = tomllib.loads(src_path.read_text())
          sources = src_data.get('sources', [])
          hashed = [s for s in sources if s.get('blake3', '')]
          print(f'Thread 1 WCM sources: {len(sources)} total, {len(hashed)} with BLAKE3')

          # Verify targets file exists and parses
          tgt_path = pathlib.Path('data/targets/thread01_wcm_targets.toml')
          tgt_data = tomllib.loads(tgt_path.read_text())
          targets = tgt_data.get('targets', [])
          meta = tgt_data.get('meta', {})
          declared = meta.get('total_targets', 0)
          print(f'Thread 1 WCM targets: {len(targets)} total (declared: {declared})')

          # Every target must reference a valid spring
          valid_springs = {'hotSpring', 'wetSpring', 'groundSpring', 'airSpring',
                           'healthSpring', 'neuralSpring', 'ludoSpring', 'primalSpring'}
          for t in targets:
              spring = t.get('spring', '')
              if spring and spring not in valid_springs:
                  print(f'WARN: target {t.get(\"id\",\"?\")} references unknown spring: {spring}')

              ev = t.get('expected_value')
              has_tol = 'tolerance' in t or 'tolerance_pct' in t
              if ev is not None and not has_tol:
                  print(f'FAIL: target {t.get(\"id\",\"?\")} has expected_value but no tolerance')
                  errors += 1

          # Verify workloads exist for thread01
          wl_dir = pathlib.Path('workloads/thread01_wcm')
          if not wl_dir.exists():
              print(f'FAIL: workloads/thread01_wcm/ directory missing')
              errors += 1
          else:
              wls = list(wl_dir.glob('*.toml'))
              print(f'Thread 1 WCM workloads: {len(wls)}')
              for wl in wls:
                  wl_data = tomllib.loads(wl.read_text())
                  wl_meta = wl_data.get('metadata', {})
                  if wl_meta.get('thread') != '01':
                      print(f'FAIL: {wl.name} has thread={wl_meta.get(\"thread\")} not \"01\"')
                      errors += 1

          print(f'{errors} error(s)' if errors else 'Thread 1 WCM integrity: PASS')
          sys.exit(1 if errors else 0)
          "

      - name: Workload skip section coverage
        run: |
          python3 -c "
          import sys, pathlib
          try:
              import tomllib
          except ImportError:
              import tomli as tomllib

          missing = []
          total = 0
          for f in sorted(pathlib.Path('workloads').rglob('*.toml')):
              total += 1
              data = tomllib.loads(f.read_text())
              if 'skip' not in data:
                  missing.append(str(f))

          if missing:
              print(f'FAIL: {len(missing)}/{total} workloads missing [skip] section:')
              for m in missing:
                  print(f'  - {m}')
              sys.exit(1)
          print(f'All {total} workloads have [skip] sections')
          "

      - name: Thread index count reconciliation
        run: |
          python3 -c "
          import sys, pathlib
          try:
              import tomllib
          except ImportError:
              import tomli as tomllib

          idx = tomllib.loads(pathlib.Path('lineage/THREAD_INDEX.toml').read_text())
          threads = idx.get('threads', [])
          declared = idx.get('meta', {}).get('total_threads', -1)
          actual = len(threads)
          if declared != actual:
              print(f'FAIL: meta.total_threads={declared} but found {actual} [[threads]] entries')
              sys.exit(1)
          shorts = [t['short'] for t in threads]
          dupes = [s for s in shorts if shorts.count(s) > 1]
          if dupes:
              print(f'FAIL: duplicate shorts: {set(dupes)}')
              sys.exit(1)
          print(f'Thread index consistent: {actual} threads, all shorts unique')
          "

      - name: Shell library fixture tests
        run: |
          export FOUNDATION_ROOT="$PWD"

          # json_rpc.sh — test rpc_has_result, rpc_has_error, rpc_error_message
          source deploy/lib/json_rpc.sh

          GOOD='{"jsonrpc":"2.0","result":{"ok":true},"id":1}'
          ERR_RESP='{"jsonrpc":"2.0","error":{"code":-32600,"message":"bad request"},"id":1}'
          EMPTY_RESP=''

          rpc_has_result "$GOOD" || { echo "FAIL: rpc_has_result should pass on valid result"; exit 1; }
          ! rpc_has_result "$ERR_RESP" || { echo "FAIL: rpc_has_result should fail on error response"; exit 1; }
          ! rpc_has_result "$EMPTY_RESP" || { echo "FAIL: rpc_has_result should fail on empty response"; exit 1; }

          rpc_has_error "$ERR_RESP" || { echo "FAIL: rpc_has_error should pass on error response"; exit 1; }
          rpc_has_error "$EMPTY_RESP" || { echo "FAIL: rpc_has_error should pass on empty response"; exit 1; }
          ! rpc_has_error "$GOOD" || { echo "FAIL: rpc_has_error should fail on valid result"; exit 1; }

          MSG=$(rpc_error_message "$ERR_RESP")
          [[ "$MSG" == "bad request" ]] || { echo "FAIL: rpc_error_message expected 'bad request', got '$MSG'"; exit 1; }

          FIELD=$(rpc_extract_field "$GOOD" "ok")
          [[ "$FIELD" == "True" ]] || [[ "$FIELD" == "true" ]] || { echo "FAIL: rpc_extract_field expected true, got '$FIELD'"; exit 1; }

          echo "json_rpc.sh: all tests passed"

          # thread_registry.sh — test list_thread_shorts, resolve_thread_dir
          source deploy/lib/thread_registry.sh

          SHORTS=$(list_thread_shorts)
          echo "$SHORTS" | grep -q "wcm" || { echo "FAIL: list_thread_shorts missing 'wcm'"; exit 1; }
          echo "$SHORTS" | grep -q "ltee" || { echo "FAIL: list_thread_shorts missing 'ltee'"; exit 1; }

          DIR=$(resolve_thread_dir "wcm")
          [[ "$DIR" == "thread01" ]] || { echo "FAIL: resolve_thread_dir 'wcm' expected 'thread01', got '$DIR'"; exit 1; }

          DIR=$(resolve_thread_dir "enviro")
          [[ "$DIR" == "thread04" ]] || { echo "FAIL: resolve_thread_dir 'enviro' expected 'thread04', got '$DIR'"; exit 1; }

          echo "thread_registry.sh: all tests passed"

          # primal_ipc.sh — test discover_port fallback, blake3_hash failure
          source deploy/lib/primal_ipc.sh

          # discover_port: no discovery socket, no env → config file fallback
          unset NESTGATE_PORT NESTGATE_SOCKET
          PORT=$(discover_port "nestgate")
          [[ "$PORT" == "9500" ]] || { echo "FAIL: discover_port 'nestgate' expected 9500, got '$PORT'"; exit 1; }

          PORT=$(discover_port "rhizocrypt")
          [[ "$PORT" == "9601" ]] || { echo "FAIL: discover_port 'rhizocrypt' expected 9601, got '$PORT'"; exit 1; }

          # discover_port: env override
          export TOADSTOOL_PORT=1234
          PORT=$(discover_port "toadstool")
          [[ "$PORT" == "1234" ]] || { echo "FAIL: discover_port with env override expected 1234, got '$PORT'"; exit 1; }
          unset TOADSTOOL_PORT

          # discover_port: explicit default wins over config
          PORT=$(discover_port "nestgate" "5555")
          [[ "$PORT" == "5555" ]] || { echo "FAIL: discover_port explicit default expected 5555, got '$PORT'"; exit 1; }

          # discover_socket: no socket file exists → returns empty
          unset NESTGATE_SOCKET
          SOCK=$(discover_socket "nestgate")
          [[ -z "$SOCK" ]] || { echo "FAIL: discover_socket should return empty when no socket exists, got '$SOCK'"; exit 1; }

          # discover_socket: env override with real socket
          TMPDIR_TEST=$(mktemp -d)
          SOCK_PATH="$TMPDIR_TEST/test-nestgate.sock"
          python3 -c "
import socket, os, sys, threading
s = socket.socket(socket.AF_UNIX, socket.SOCK_STREAM)
s.bind(sys.argv[1])
s.listen(1)
open(sys.argv[1] + '.ready', 'w').close()
conn, _ = s.accept()
conn.recv(1024)
conn.sendall(b'{\"jsonrpc\":\"2.0\",\"result\":{\"ok\":true},\"id\":1}')
conn.close()
s.close()
" "$SOCK_PATH" &
          SOCK_PID=$!
          for _ in $(seq 1 20); do [ -f "$SOCK_PATH.ready" ] && break; sleep 0.1; done
          export NESTGATE_SOCKET="$SOCK_PATH"
          SOCK=$(discover_socket "nestgate")
          [[ "$SOCK" == "$SOCK_PATH" ]] || { echo "FAIL: discover_socket env override expected '$SOCK_PATH', got '$SOCK'"; kill $SOCK_PID 2>/dev/null; exit 1; }

          # _rpc_uds: send request to mock socket
          RESP=$(_rpc_uds "$SOCK_PATH" '{"jsonrpc":"2.0","method":"test","params":{},"id":1}')
          echo "$RESP" | grep -q '"ok"' || { echo "FAIL: _rpc_uds expected result with 'ok', got '$RESP'"; kill $SOCK_PID 2>/dev/null; exit 1; }
          kill $SOCK_PID 2>/dev/null; wait $SOCK_PID 2>/dev/null
          unset NESTGATE_SOCKET
          rm -rf "$TMPDIR_TEST"

          # blake3_hash: missing file → should fail
          if blake3_hash "/nonexistent_file_$$" 2>/dev/null; then
            echo "FAIL: blake3_hash should fail on nonexistent file"
            exit 1
          fi

          # DISCOVERY_FALLBACK_COUNT should be > 0 after discover_port fallbacks
          [[ "$DISCOVERY_FALLBACK_COUNT" -gt 0 ]] || { echo "FAIL: DISCOVERY_FALLBACK_COUNT should be >0"; exit 1; }

          echo "primal_ipc.sh: all tests passed"

          # target_compare.sh — verify it sources correctly and defines compare_targets
          source deploy/lib/target_compare.sh
          if type compare_targets &>/dev/null && type resolve_target_file &>/dev/null; then
            echo "target_compare.sh: functions defined (compare_targets, resolve_target_file)"
          else
            echo "FAIL: target_compare.sh did not define expected functions"; exit 1
          fi

          echo "All shell library fixture tests passed"

      - name: Gate naming consistency
        run: |
          python3 -c "
          import pathlib, sys, re

          inconsistent = []
          for f in sorted(pathlib.Path('.').rglob('*')):
              if f.is_file() and f.suffix in ('.sh', '.md', '.toml', '.yml', '.yaml'):
                  try:
                      text = f.read_text()
                  except Exception:
                      continue
                  if 'ironGate' in text:
                      inconsistent.append(str(f))
          if inconsistent:
              print(f'FAIL: {len(inconsistent)} file(s) use \"ironGate\" instead of \"irongate\":')
              for f in inconsistent:
                  print(f'  - {f}')
              sys.exit(1)
          print('Gate naming consistent (all lowercase irongate)')
          "

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy (pedantic + nursery, deny warnings)
        run: |
          cargo clippy --workspace -- -D warnings
          cargo clippy --workspace --tests -- -D warnings -A clippy::unwrap_used -A clippy::expect_used

      - name: Build release
        run: cargo build --release

      - name: Run tests
        run: cargo test --workspace -- --test-threads=1

      - name: Binary size check
        run: |
          SIZE=$(stat --format=%s target/release/foundation 2>/dev/null || echo 0)
          MB=$((SIZE / 1048576))
          echo "Binary size: ${MB}MB (${SIZE} bytes)"
          if [ "$SIZE" -gt 10485760 ]; then
            echo "::error::Binary exceeds 10MB threshold (${MB}MB)"
            exit 1
          fi

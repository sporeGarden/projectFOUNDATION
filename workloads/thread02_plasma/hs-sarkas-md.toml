# SPDX-License-Identifier: AGPL-3.0-or-later
# Thread 2 Plasma Physics — hotSpring Sarkas Yukawa MD
#
# foundation_validate.sh --thread plasma discovers this via thread*plasma* glob.
# Runs the sarkas-yukawa-md scenario from hotSpring UniBin validate.
# Validates 12+ foundation targets: energy drift, D*, Daligault fit, RDF.

[metadata]
name = "hs-sarkas-md"
description = "Sarkas Yukawa OCP — Daligault D* fit + energy conservation + transport parity"
version = "0.1.0"
thread = "02"
thread_name = "Plasma Physics / Lattice QCD"
spring = "hotSpring"

[execution]
type = "native"
command = "${SPRINGS_ROOT:-${ECOPRIMALS_ROOT}/springs}/hotSpring/barracuda/target/release/hotspring_unibin"
args = ["validate", "--scenario", "sarkas-yukawa-md"]
working_dir = "${SPRINGS_ROOT:-${ECOPRIMALS_ROOT}/springs}/hotSpring"

[resources]
max_memory_bytes = 8589934592
max_cpu_percent = 90.0

[security]
isolation_level = "Standard"
trusted_directories = ["${SPRINGS_ROOT}", "${ECOPRIMALS_ROOT}"]

[skip]
when = "binary_missing"
binary = "${SPRINGS_ROOT:-${ECOPRIMALS_ROOT}/springs}/hotSpring/barracuda/target/release/hotspring_unibin"
reason = "hotspring_unibin binary only exists after hotSpring build (cargo build --release in hotSpring/barracuda)"

[provenance]
chain = "rhizoCrypt"
attestation = "sweetGrass"
spine = "loamSpine"
requires_trio = true

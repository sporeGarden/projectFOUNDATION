# SPDX-License-Identifier: AGPL-3.0-or-later
[metadata]
name = "airspring-et0-methods"
description = "8 ET₀ methods: PM, PT, Thornthwaite, Hargreaves, Makkink, Turc, Hamon, Blaney-Criddle"
version = "0.1.0"
thread = "06"
thread_name = "Agricultural Science"

[execution]
type = "native"
command = "${AIRSPRING_ROOT:-${SPRINGS_ROOT:-${ECOPRIMALS_ROOT}/springs}/airSpring}/barracuda/target/release/airspring validate --scenario et0-methods"
working_dir = "${AIRSPRING_ROOT:-${SPRINGS_ROOT:-${ECOPRIMALS_ROOT}/springs}/airSpring}"

[resources]
max_memory_bytes = 4294967296
max_cpu_percent = 80.0

[security]
isolation_level = "Standard"
trusted_directories = ["${SPRINGS_ROOT}", "${ECOPRIMALS_ROOT}"]

[skip]
when = "binary_missing"
binary = "${AIRSPRING_ROOT:-${SPRINGS_ROOT:-${ECOPRIMALS_ROOT}/springs}/airSpring}/barracuda/target/release/airspring"
reason = "airspring binary only exists after spring build (cargo build --release in airSpring/barracuda)"

[provenance]
chain = "rhizoCrypt"
attestation = "sweetGrass"
spine = "loamSpine"
requires_trio = true

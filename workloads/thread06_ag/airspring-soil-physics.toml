[metadata]
name = "airspring-soil-physics"
description = "Richards equation (VG-Mualem) + Green-Ampt infiltration + SCS curve number + pedotransfer"
version = "0.1.0"

[execution]
type = "native"
command = "${AIRSPRING_ROOT}/target/release/airspring validate --scenario soil-physics"
working_dir = "${AIRSPRING_ROOT}"

[resources]
max_memory_bytes = 8589934592
max_cpu_percent = 80.0

[security]
isolation_level = "None"

[skip]
when = "binary_missing"
binary = "${AIRSPRING_ROOT}/target/release/airspring"
reason = "airspring binary only exists after spring build (cargo build --release in airSpring)"

[provenance]
chain = "rhizoCrypt"
attestation = "sweetGrass"
spine = "loamSpine"
requires_trio = true

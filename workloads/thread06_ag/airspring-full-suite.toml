[metadata]
name = "airspring-full-suite"
description = "Complete airSpring validation — 87 experiments, 60 tolerances, all domains"
version = "0.1.0"
thread = "06"
thread_name = "Agricultural Science"

[execution]
type = "native"
command = "${AIRSPRING_ROOT:-${SPRINGS_ROOT:-${ECOPRIMALS_ROOT}/springs}/airSpring}/target/release/airspring validate --scenario paper-chain"
working_dir = "${AIRSPRING_ROOT:-${SPRINGS_ROOT:-${ECOPRIMALS_ROOT}/springs}/airSpring}"

[resources]
max_memory_bytes = 16106127360
max_cpu_percent = 80.0

[security]
isolation_level = "Standard"
trusted_directories = ["${SPRINGS_ROOT}", "${ECOPRIMALS_ROOT}"]

[skip]
when = "binary_missing"
binary = "${AIRSPRING_ROOT:-${SPRINGS_ROOT:-${ECOPRIMALS_ROOT}/springs}/airSpring}/target/release/airspring"
reason = "airspring binary only exists after spring build (cargo build --release in airSpring)"

[provenance]
chain = "rhizoCrypt"
attestation = "sweetGrass"
spine = "loamSpine"
requires_trio = true

[metadata]
name = "airspring-atlas-pipeline"
description = "Michigan Crop Water Atlas — 100 stations, 80 years, full ET₀ + yield pipeline"
version = "0.1.0"
thread = "06"
thread_name = "Agricultural Science"

[execution]
type = "native"
command = "${AIRSPRING_ROOT:-${SPRINGS_ROOT:-${ECOPRIMALS_ROOT}/springs}/airSpring}/barracuda/target/release/airspring validate --scenario atlas-pipeline"
working_dir = "${AIRSPRING_ROOT:-${SPRINGS_ROOT:-${ECOPRIMALS_ROOT}/springs}/airSpring}"

[resources]
max_memory_bytes = 8589934592
max_cpu_percent = 80.0

[security]
isolation_level = "Standard"
trusted_directories = ["${SPRINGS_ROOT}", "${ECOPRIMALS_ROOT}"]

[skip]
when = "binary_missing"
binary = "${AIRSPRING_ROOT:-${SPRINGS_ROOT:-${ECOPRIMALS_ROOT}/springs}/airSpring}/barracuda/target/release/airspring"
reason = "airspring binary only exists after spring build (cargo build --release in airSpring/barracuda)"

[provenance]
chain = "rhizoCrypt"
attestation = "sweetGrass"
spine = "loamSpine"
requires_trio = true

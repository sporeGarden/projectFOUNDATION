[metadata]
name = "airspring-atlas-pipeline"
description = "Michigan Crop Water Atlas — 100 stations, 80 years, full ET₀ + yield pipeline"
version = "0.1.0"

[execution]
type = "native"
command = "${AIRSPRING_ROOT}/target/release/airspring validate --scenario atlas-pipeline"
working_dir = "${AIRSPRING_ROOT}"

[resources]
max_memory_bytes = 8589934592
max_cpu_percent = 80.0

[security]
isolation_level = "None"

[skip]
when = "binary_missing"
binary = "${AIRSPRING_ROOT}/target/release/airspring"
reason = "airspring binary only exists after spring build (cargo build --release in airSpring)"

[provenance]
chain = "rhizoCrypt"
attestation = "sweetGrass"
spine = "loamSpine"
requires_trio = true

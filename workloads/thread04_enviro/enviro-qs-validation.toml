# SPDX-License-Identifier: AGPL-3.0-or-later
# Thread 4: Environmental Genomics — QS Framework Validation
#
# Delegates to wetSpring and groundSpring validators for Anderson QS
# critical disorder, cross-environment QS gene scans, and field genomics.
# Previously this workload hardcoded expected=actual (always-pass);
# now it delegates to real spring binaries that compute values independently.

[metadata]
name = "enviro-qs-validation"
description = "Validate QS framework targets via wetSpring + groundSpring"
version = "0.2.0"
thread = "04"
thread_name = "Environmental Genomics & Field Science"

[execution]
type = "native"
command = "${GROUNDSPRING_ROOT:-${SPRINGS_ROOT:-${ECOPRIMALS_ROOT}/springs}/groundSpring}/target/release/validate_all"
args = ["--filter", "anderson_qs"]
working_dir = "${GROUNDSPRING_ROOT:-${SPRINGS_ROOT:-${ECOPRIMALS_ROOT}/springs}/groundSpring}"

[resources]
max_memory_bytes = 4294967296
max_cpu_percent = 80.0

[security]
isolation_level = "Standard"
trusted_directories = ["${GROUNDSPRING_ROOT}", "${ECOPRIMALS_ROOT}"]

[skip]
when = "binary_missing"
binary = "${GROUNDSPRING_ROOT:-${SPRINGS_ROOT:-${ECOPRIMALS_ROOT}/springs}/groundSpring}/target/release/validate_all"
reason = "groundSpring binary requires: cargo build --release in groundSpring"

[provenance]
chain = "rhizoCrypt"
attestation = "sweetGrass"
spine = "loamSpine"
requires_trio = true

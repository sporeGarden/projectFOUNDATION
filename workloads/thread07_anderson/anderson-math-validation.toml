# SPDX-License-Identifier: AGPL-3.0-or-later
# Thread 7: Anderson Mathematics — Cross-Cutting Validation
#
# Delegates to groundSpring validate_all for Anderson localization theory:
# Lyapunov exponents, localization length scaling, almost-Mathieu transition,
# spectral diagnostics, and NUCLEUS composition parity.
# Previously this workload hardcoded expected=actual (always-pass);
# now it delegates to real spring binaries that compute values independently.

[metadata]
name = "anderson-math-validation"
description = "Validate Anderson localization theory targets via groundSpring"
version = "0.2.0"
thread = "07"
thread_name = "Anderson Mathematics"

[execution]
type = "native"
command = "${GROUNDSPRING_ROOT:-${SPRINGS_ROOT:-${ECOPRIMALS_ROOT}/springs}/groundSpring}/crates/groundspring-validate/target/release/validate_all"
args = ["--filter", "anderson"]
working_dir = "${GROUNDSPRING_ROOT:-${SPRINGS_ROOT:-${ECOPRIMALS_ROOT}/springs}/groundSpring}"

[resources]
max_memory_bytes = 8589934592
max_cpu_percent = 80.0

[security]
isolation_level = "Standard"
trusted_directories = ["${GROUNDSPRING_ROOT}", "${ECOPRIMALS_ROOT}"]

[skip]
when = "binary_missing"
binary = "${GROUNDSPRING_ROOT:-${SPRINGS_ROOT:-${ECOPRIMALS_ROOT}/springs}/groundSpring}/crates/groundspring-validate/target/release/validate_all"
reason = "groundSpring binary requires: cargo build --release -p groundspring-validate in groundSpring"

[provenance]
chain = "rhizoCrypt"
attestation = "sweetGrass"
spine = "loamSpine"
requires_trio = true

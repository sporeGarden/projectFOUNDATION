# Thread 5: LTEE — Mutation Accumulation Validation
#
# Runs lithoSpore ltee-mutations module against Tenaillon (2016) genome data.
# Validates mutation rate estimates, DFE fitting, and epistasis quantification.

[metadata]
name = "litho-ltee-mutations"
description = "LTEE mutation accumulation validation (Tenaillon 2016, DFE fitting)"
version = "0.1.0"
thread = "05"
thread_name = "Evolutionary Biology / LTEE"
spring = "groundSpring"

[execution]
type = "native"
command = "${GARDENS_ROOT:-${ECOPRIMALS_ROOT}/gardens}/lithoSpore/target/release/ltee-mutations"
working_dir = "${GARDENS_ROOT:-${ECOPRIMALS_ROOT}/gardens}/lithoSpore"

[resources]
max_memory_bytes = 4294967296
max_cpu_percent = 80.0

[security]
isolation_level = "Standard"
trusted_directories = ["${GARDENS_ROOT}", "${ECOPRIMALS_ROOT}"]

[skip]
when = "binary_missing"
binary = "${GARDENS_ROOT:-${ECOPRIMALS_ROOT}/gardens}/lithoSpore/target/release/ltee-mutations"
reason = "lithoSpore binary requires: cargo build --release in lithoSpore"

[provenance]
chain = "rhizoCrypt"
attestation = "sweetGrass"
spine = "loamSpine"
requires_trio = true

#
# Validation targets for Thread 1: Whole-Cell Modeling
# Expected numerical results from ABG papers A-G that NUCLEUS must reproduce.

[meta]
thread = 1
thread_name = "Whole-Cell Modeling"
expression = "expressions/ABG_WHOLE_CELL_REBUILD.md"
last_updated = "2026-05-06"

# --- Paper A: Karr et al. 2012 ---

[[targets]]
id = "paper_a_cell_cycle"
paper = "A"
description = "Cell cycle duration for M. genitalium whole-cell model"
expected_value = 9.0
unit = "hours"
tolerance = 0.5
source = "Karr et al. 2012, Figure 3"
spring = "hotSpring"
blake3 = ""
validated = false

[[targets]]
id = "paper_a_gene_essentiality"
paper = "A"
description = "Gene essentiality prediction accuracy"
expected_value = 79.0
unit = "percent"
tolerance = 3.0
source = "Karr et al. 2012, Table S5"
spring = "wetSpring"
blake3 = ""
validated = false

[[targets]]
id = "paper_a_growth_rate"
paper = "A"
description = "Cellular growth rate matches experimental doubling time"
expected_value = 9.0
unit = "hours"
tolerance = 1.0
source = "Karr et al. 2012, comparison to experimental ~10-12h"
spring = "hotSpring"
blake3 = ""
validated = false


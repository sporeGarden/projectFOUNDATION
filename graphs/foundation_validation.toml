# SPDX-License-Identifier: AGPL-3.0-or-later
#
# Foundation Validation Graph
#
# Minimum composition for validating data thread expressions.
# Provenance-heavy: Nest Atomic (storage + provenance trio) is required;
# Node Atomic (compute dispatch) is required for numerical validation.
# Tower Atomic provides the trust boundary.
#
# Aligned with primalSpring graph envelope:
# - Dark Forest metadata (secure_by_default, btsp_enforced, uds_only)
# - by_capability routing on every node
# - Capability method strings from canonical registry
#
# Usage:
#   toadstool execute graphs/foundation_validation.toml

[graph]
name = "foundation_validation"
id = "foundation-validation-v1"
description = "Foundation data thread validation — provenance-heavy composition"
version = "1.1.0"
coordination = "sequential"

[graph.metadata]
base = "nest_atomic"
security_model = "btsp_enforced"
transport = "uds_only"
secure_by_default = true
vps_standard = true
purpose = "Validate foundation data sources and reproduce published results with full provenance"
fragments = ["tower_atomic", "node_atomic", "nest_atomic"]
resolve = true

# Phase 0: biomeOS substrate
[[graph.nodes]]
name = "biomeos_neural_api"
binary = "biomeos"
order = 0
required = true
spawn = false
by_capability = "orchestration"
capabilities = ["graph.list", "graph.deploy", "graph.status"]
health_method = "graph.list"

# All substrate primals are pre-deployed by NUCLEUS (spawn=false).
# This graph is an overlay — it declares the composition topology
# but does not spawn primals. Aligned with cell graph pattern.

# Phase 1: Tower Atomic (trust boundary)
[[graph.nodes]]
name = "beardog"
binary = "beardog_primal"
order = 1
required = true
spawn = false
depends_on = ["biomeos_neural_api"]
by_capability = "crypto"
capabilities = ["crypto.sign", "crypto.verify", "crypto.encrypt"]
health_method = "health.liveness"

[[graph.nodes]]
name = "songbird"
binary = "songbird_primal"
order = 2
required = true
spawn = false
depends_on = ["biomeos_neural_api"]
by_capability = "discovery"
capabilities = ["discovery.find_primals", "discovery.announce"]
health_method = "health.liveness"

[[graph.nodes]]
name = "skunkbat"
binary = "skunkbat"
order = 3
required = true
spawn = false
depends_on = ["beardog"]
by_capability = "defense"
capabilities = ["security.audit_event", "defense.status"]
health_method = "health.liveness"

# Phase 2: Node Atomic (compute dispatch)
[[graph.nodes]]
name = "toadstool"
binary = "toadstool"
order = 4
required = true
spawn = false
depends_on = ["beardog", "songbird"]
by_capability = "compute"
capabilities = ["compute.dispatch", "compute.status", "compute.execute"]
health_method = "health.liveness"

[[graph.nodes]]
name = "barracuda"
binary = "barracuda"
order = 5
required = true
spawn = false
depends_on = ["beardog"]
by_capability = "math"
capabilities = ["stats.mean", "stats.variance", "linalg.solve"]
health_method = "health.liveness"

[[graph.nodes]]
name = "coralreef"
binary = "coralreef"
order = 6
required = false
spawn = false
fallback = "skip"
depends_on = ["beardog"]
by_capability = "shader"
capabilities = ["shader.compile.wgsl", "shader.dispatch"]
health_method = "health.liveness"

# Phase 3: Nest Atomic (storage + provenance — all required for foundation)
[[graph.nodes]]
name = "nestgate"
binary = "nestgate"
order = 7
required = true
spawn = false
depends_on = ["beardog"]
by_capability = "storage"
capabilities = ["storage.store", "storage.retrieve", "content.resolve"]
health_method = "health.liveness"

[[graph.nodes]]
name = "rhizocrypt"
binary = "rhizocrypt"
order = 8
required = true
spawn = false
depends_on = ["beardog"]
by_capability = "dag"
capabilities = ["dag.session.create", "dag.event.append", "dag.session.complete"]
health_method = "health.liveness"

[[graph.nodes]]
name = "loamspine"
binary = "loamspine"
order = 9
required = true
spawn = false
depends_on = ["beardog", "rhizocrypt"]
by_capability = "spine"
capabilities = ["spine.create", "entry.append"]
health_method = "health.liveness"

[[graph.nodes]]
name = "sweetgrass"
binary = "sweetgrass"
order = 10
required = true
spawn = false
depends_on = ["beardog", "loamspine"]
by_capability = "braid"
capabilities = ["braid.create", "braid.commit"]
health_method = "health.liveness"

# Phase 4: Visualization (optional — enriches validation with live rendering)
[[graph.nodes]]
name = "petaltongue"
binary = "petaltongue"
order = 11
required = false
spawn = false
fallback = "skip"
depends_on = ["beardog", "songbird"]
by_capability = "visualization"
capabilities = ["visualization.render.dashboard", "visualization.render.stream", "interaction.poll"]
health_method = "health.liveness"

# Phase 5: AI (optional — ML-assisted parameter estimation)
[[graph.nodes]]
name = "squirrel"
binary = "squirrel"
order = 12
required = false
spawn = false
fallback = "skip"
depends_on = ["beardog"]
by_capability = "ai"
capabilities = ["ai.query", "ai.models"]
health_method = "health.liveness"
